openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
  description: API for managing users

paths:
  /createuser:
    post:
      summary: Creates a new user
      description: Creates a new user with the given username.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  example: "testuser"
      responses:
        '200':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User testuser created successfully in MongoDB"
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '409':
          description: User already exists

  /logout:
    post:
      summary: Logs out a user
      description: Updates the lastLogoutAt timestamp of the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  example: "testuser"
      responses:
        '200':
          description: User logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User testuser logged out"
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Username missing
        '404':
          description: User not found

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: "65cfa4b8f1a2c34d56789abc"
        username:
          type: string
          example: "testuser"
        createdAt:
          type: string
          format: date-time
          example: "2026-02-24T18:25:43.511Z"
        lastLogoutAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-02-24T19:00:12.321Z"