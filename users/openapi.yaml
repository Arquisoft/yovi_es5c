openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
  description: API for managing users

paths:
  /user:
    post:
      summary: Creates a new user
      description: Creates a new user with the given username.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  example: "testuser"
      responses:
        '200':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User testuser created successfully in MongoDB"
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '409':
          description: User already exists

  /login:
    post:
      summary: User login
      description: Authenticates a user and returns a JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Invalid credentials
        '500':
          description: Internal server error

  /user/{username}:
    get:
      summary: Gets a user profile
      description: Returns the public account data for the given user.
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found
    put:
      summary: Updates a user profile
      description: Updates name, surname and email for the given user.
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: User profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid profile data
        '404':
          description: User not found

  /user/{username}/history:
    get:
      summary: Get user game history
      description: Returns a list of game sessions for the given user.
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        '200':
          description: History retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameSession'
        '404':
          description: User not found

  /logout:
    post:
      summary: Logs out a user
      description: Updates the lastLogoutAt timestamp of the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  example: "testuser"
      responses:
        '200':
          description: User logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User testuser logged out"
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Username missing
        '404':
          description: User not found

  /game/finish:
    post:
      summary: Save game results
      description: Stores the details of a finished game session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameSession'
      responses:
        '201':
          description: Game session saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSession'
        '500':
          description: Internal server error

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: "65cfa4b8f1a2c34d56789abc"
        username:
          type: string
          example: "testuser"
        createdAt:
          type: string
          format: date-time
          example: "2026-02-24T18:25:43.511Z"
        lastLogoutAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-02-24T19:00:12.321Z"
    UserProfile:
      type: object
      properties:
        _id:
          type: string
          example: "65cfa4b8f1a2c34d56789abc"
        username:
          type: string
          example: "testuser"
        name:
          type: string
          example: "Mario"
        surname:
          type: string
          example: "Trelles"
        email:
          type: string
          example: "mario@uniovi.es"

    GameSession:
      type: object
      required:
        - userId
        - rival
        - level
        - duration
        - result
      properties:
        userId:
          type: string
          example: "testuser"
        rival:
          type: string
          enum: [bot, multiplayer]
          example: "bot"
        level:
          type: string
          enum: [Easy, Medium, Hard]
          example: "Medium"
        duration:
          type: integer
          description: Duration of the game in seconds
          example: 120
        result:
          type: string
          enum: [won, lost]
          example: "won"
        createdAt:
          type: string
          format: date-time
          example: "2026-02-24T18:25:43.511Z"
    UserProfileUpdate:
      type: object
      required:
        - name
        - surname
        - email
      properties:
        name:
          type: string
          example: "Mario"
        surname:
          type: string
          example: "Trelles"
        email:
          type: string
          example: "mario@uniovi.es"
