server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location ~* \.mp4$ {
        add_header Accept-Ranges bytes;
        add_header Cache-Control "no-cache";
        types { video/mp4 mp4; }
    }
}